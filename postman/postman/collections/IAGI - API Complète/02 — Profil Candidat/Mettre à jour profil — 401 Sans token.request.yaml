$kind: http-request
url: "{{base_url}}/profil"
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: text
  content: |-
    {
        "titre": "Hacker"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 401 — unauthenticated', function () {
          pm.response.to.have.status(401);
      });
    language: text/javascript
order: 4000

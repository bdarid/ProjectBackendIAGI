$kind: http-request
url: "{{base_url}}/profil/me"
method: GET
headers:
  Accept: application/json
  Authorization: Bearer {{token_recruteur}}
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 403 — forbidden for recruteur', function () {
          pm.response.to.have.status(403);
      });
    language: text/javascript
order: 2000

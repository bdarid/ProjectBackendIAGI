$kind: http-request
url: "{{base_url}}/profil/competences"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token_candidat}}
body:
  type: text
  content: |-
    {
        "competence_id": 1,
        "niveau": "intermédiaire"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200 — competence added', function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
order: 5000

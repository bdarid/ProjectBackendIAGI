$kind: http-request
url: "{{base_url}}/offres"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token_candidat}}
body:
  type: text
  content: |-
    {
        "titre": "Offre pirate",
        "description": "Je suis candidat, pas recruteur",
        "localisation": "Nulle part",
        "type": "Stage"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 403 — candidat cannot create offre', function () {
          pm.response.to.have.status(403);
      });
    language: text/javascript
order: 6000

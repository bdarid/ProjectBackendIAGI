$kind: http-request
url: "{{base_url}}/offres/{{offre_id}}"
method: DELETE
headers:
  Accept: application/json
  Authorization: Bearer {{token_recruteur}}
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200 — offre deleted', function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
order: 10000

$kind: http-request
url: "{{base_url}}/admin/users"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 401 — unauthenticated', function () {
          pm.response.to.have.status(401);
      });
    language: text/javascript
order: 5000

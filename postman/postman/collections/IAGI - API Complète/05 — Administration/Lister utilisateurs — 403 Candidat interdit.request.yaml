$kind: http-request
url: "{{base_url}}/admin/users"
method: GET
headers:
  Accept: application/json
  Authorization: Bearer {{token_candidat}}
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 403 — candidat forbidden', function () {
          pm.response.to.have.status(403);
      });
    language: text/javascript
order: 3000

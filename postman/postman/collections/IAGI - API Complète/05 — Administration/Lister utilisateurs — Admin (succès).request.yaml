$kind: http-request
url: "{{base_url}}/admin/users"
method: GET
headers:
  Accept: application/json
  Authorization: Bearer {{token_admin}}
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200 — users listed', function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
order: 2000

$kind: http-request
url: "{{base_url}}/candidatures/{{candidature_id}}/statut"
method: PATCH
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token_recruteur}}
body:
  type: text
  content: |-
    {
        "statut": "invalide"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 422 — invalid statut value', function () {
          pm.response.to.have.status(422);
      });
    language: text/javascript
order: 10000

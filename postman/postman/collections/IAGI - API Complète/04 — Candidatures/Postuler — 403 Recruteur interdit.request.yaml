$kind: http-request
url: "{{base_url}}/offres/{{offre_id}}/postuler"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token_recruteur}}
body:
  type: text
  content: |-
    {
        "message": "Je suis recruteur, pas candidat"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 403 — recruteur cannot apply', function () {
          pm.response.to.have.status(403);
      });
    language: text/javascript
order: 4000

$kind: http-request
url: "{{base_url}}/candidatures/{{candidature_id}}/statut"
method: PATCH
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token_recruteur}}
body:
  type: text
  content: |-
    {
        "statut": "refusée"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200 — statut updated to refusée', function () {
          pm.response.to.have.status(200);
          pm.expect(pm.response.json().statut).to.eql('refusée');
      });
    language: text/javascript
order: 9000

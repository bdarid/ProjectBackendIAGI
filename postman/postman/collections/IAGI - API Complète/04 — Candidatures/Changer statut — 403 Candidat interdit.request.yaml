$kind: http-request
url: "{{base_url}}/candidatures/{{candidature_id}}/statut"
method: PATCH
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token_candidat}}
body:
  type: text
  content: |-
    {
        "statut": "acceptée"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 403 — candidat cannot change statut', function () {
          pm.response.to.have.status(403);
      });
    language: text/javascript
order: 11000

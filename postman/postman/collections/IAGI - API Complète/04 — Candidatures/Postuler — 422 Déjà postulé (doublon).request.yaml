$kind: http-request
url: "{{base_url}}/offres/{{offre_id}}/postuler"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token_candidat}}
body:
  type: text
  content: |-
    {
        "message": "Tentative de doublon"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 422 — already applied', function () {
          pm.response.to.have.status(422);
      });
    language: text/javascript
order: 3000

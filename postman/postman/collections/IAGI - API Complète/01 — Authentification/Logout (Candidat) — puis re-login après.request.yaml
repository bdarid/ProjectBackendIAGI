$kind: http-request
url: "{{base_url}}/auth/logout"
method: POST
headers:
  Accept: application/json
  Authorization: Bearer {{token_candidat}}
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200 — logged out', function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
order: 12000
